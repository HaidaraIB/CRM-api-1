<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <style>
        body { background-color: #f5f3ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 32px 16px; color: #1f1f2e; direction: rtl; }
        .wrapper { max-width: 520px; margin: 0 auto; background: #fff; border-radius: 24px; box-shadow: 0 20px 50px rgba(111, 62, 240, 0.15); overflow: hidden; border: 1px solid rgba(111, 62, 240, 0.08); }
        .header { background: linear-gradient(135deg, #6b7280, #4b5563); padding: 32px; color: #fff; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; }
        .content { padding: 32px; line-height: 1.65; }
        .footer { padding: 24px 32px; font-size: 12px; color: #78738c; background: #fafafc; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header"><h1>انتهى اشتراكك</h1></div>
        <div class="content">
            <p>مرحباً {{ greeting_name }}،</p>
            <p>اشتراكك في خطة <strong>{{ plan_name }}</strong> قد انتهى.</p>
            <p>لمتابعة استخدام LOOP CRM دون انقطاع، يرجى تجديد اشتراكك من صفحة الملف الشخصي أو الاشتراك.</p>
        </div>
        <div class="footer">تم الإرسال بواسطة LOOP CRM · تحتاج مساعدة؟ رد على: {{ support_email }}</div>
    </div>
</body>
</html>
